# Circuitron local services
#
# Quick start (local / no-cloud stack):
#   cp .env.local.example .env          # fill in OLLAMA_BASE_URL + miso Postgres
#   cp mcp.env.local.example mcp.env    # fill in DATABASE_URL
#   docker build -t circuitron-mcp-local ./mcp   # build patched MCP image once
#   docker compose up -d
#   circuitron setup
#
# Cloud (Supabase + AuraDB) stack — skip the build step and set MCP_IMAGE to the
# upstream image in your .env:
#   MCP_IMAGE=ghcr.io/shaurya-sethi/circuitron-mcp:latest
#
# Individual service commands:
#   docker compose up -d neo4j           # start only Neo4j
#   docker compose stop                  # stop all, keep data
#   docker compose down -v               # teardown + delete volumes

services:

  # ── Neo4j knowledge graph ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-circuitron}
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MCP server (RAG + knowledge graph tools) ───────────────────────────────
  # Default image: upstream (cloud / Supabase path).
  # Local pgvector path: build the patched image first, then set
  #   MCP_IMAGE=circuitron-mcp-local in .env.
  mcp-server:
    image: ${MCP_IMAGE:-ghcr.io/shaurya-sethi/circuitron-mcp:latest}
    env_file: mcp.env
    ports:
      - "8051:8051"
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

# ── Notes on the KiCad container ───────────────────────────────────────────
# The KiCad image (ghcr.io/shaurya-sethi/circuitron-kicad:latest) is managed
# directly by Circuitron via the Docker SDK — it is started and stopped per
# design run, not as a persistent compose service.  Pull it once with:
#   docker pull ghcr.io/shaurya-sethi/circuitron-kicad:latest

volumes:
  neo4j_data:
