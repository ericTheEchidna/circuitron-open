# Circuitron local services
#
# Start Neo4j:
#   docker compose up -d neo4j
#
# Stop and keep data:
#   docker compose stop neo4j
#
# Full teardown (deletes graph data):
#   docker compose down -v

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: circuitron-pgvector
    environment:
      POSTGRES_USER: captain
      POSTGRES_PASSWORD: memex2026
      POSTGRES_DB: circuitron
    ports:
      - "5434:5432"   # 5433 is taken by the miso memex postgres
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: circuitron-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-circuitron}
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp-local:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: circuitron-mcp-local
    ports:
      - "8051:8051"
    depends_on:
      - pgvector
      - ollama
    env_file: mcp.env
    restart: unless-stopped

volumes:
  pgvector_data:
  ollama_data:
  neo4j_data:
