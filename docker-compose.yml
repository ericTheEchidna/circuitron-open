services:
  # Ollama and pgvector are provided by miso — no need to run them here.
  # mcp-local reaches them via host.docker.internal (mapped by extra_hosts below).

  mcp-local:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: circuitron-mcp-local
    ports:
      - "8051:8051"
    env_file: mcp.env
    extra_hosts:
      # Lets the container resolve host.docker.internal → the host machine,
      # so OLLAMA_URL=http://host.docker.internal:11434 and POSTGRES_URL
      # pointing at the miso pgvector both work without a custom network.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# ── Notes on the KiCad container ───────────────────────────────────────────
# The KiCad image (ghcr.io/shaurya-sethi/circuitron-kicad:latest) is managed
# directly by Circuitron via the Docker SDK — it is started and stopped per
# design run, not as a persistent compose service.  Pull it once with:
#   docker pull ghcr.io/shaurya-sethi/circuitron-kicad:latest
